server.port=${PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.preferQueryMode=simple
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

crm.ai.prompt-version=v1.0
crm.ai.gemini.model=gemini-3.1-flash-lite
crm.ai.gemini.base-url=https://generativelanguage.googleapis.com
crm.ai.gemini.api-key=${GEMINI_API_KEY:}
crm.ai.max-output-tokens=4000
crm.ai.use-mock-when-no-key=false
crm.ai.fallback-when-quota-exceeded=true
crm.ai.fallback-when-invalid-json=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.connect-retries=5
